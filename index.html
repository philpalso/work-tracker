<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Worktime">
<title>Worktime Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Setup screen ─────────────────────────────────────── */
  #setup-screen {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    flex-direction: column;
    gap: 16px;
  }
  #setup-screen.visible { display: flex; }
  .setup-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .setup-card h2 { font-size: 20px; margin-bottom: 6px; }
  .setup-card p  { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.5; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 600; color: #444; }
  .field input {
    border: 1.5px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .field input:focus { border-color: #1a1a2e; }
  .btn-save {
    width: 100%;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-save:active { opacity: .85; }
  .setup-note { font-size: 12px; color: #999; text-align: center; max-width: 420px; }

  /* ── Header ───────────────────────────────────────────── */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .badge-count {
    background: #e53935;
    color: #fff;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 13px;
    font-weight: 700;
    transition: background .3s;
  }
  .badge-count.done { background: #388e3c; }

  /* ── States ───────────────────────────────────────────── */
  .state { text-align: center; padding: 60px 20px; color: #888; }
  .state .icon { font-size: 48px; margin-bottom: 12px; }
  .state p { font-size: 16px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #1a1a2e;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Day groups ───────────────────────────────────────── */
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .day-group {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .day-header {
    padding: 12px 16px;
    background: #f8f9ff;
    border-bottom: 1px solid #e8eaf6;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .day-name { font-weight: 700; font-size: 15px; text-transform: capitalize; flex: 1; }
  .day-date { color: #666; font-size: 13px; }

  /* ── Entries ──────────────────────────────────────────── */
  .entry {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
    transition: opacity .3s;
  }
  .entry:last-child { border-bottom: none; }
  .entry.confirmed { opacity: .35; }
  .entry.deleted   { opacity: .2; text-decoration: line-through; }
  .entry-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { border-radius: 6px; padding: 3px 8px; font-size: 12px; font-weight: 700; letter-spacing: .5px; }
  .badge-in  { background: #e8f5e9; color: #2e7d32; }
  .badge-out { background: #fce4ec; color: #c62828; }
  .time   { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .source { font-size: 11px; color: #aaa; background: #f5f5f5; border-radius: 4px; padding: 2px 6px; }
  .note   { font-size: 12px; color: #666; font-style: italic; }
  .entry-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* ── Buttons ──────────────────────────────────────────── */
  .btn {
    border: none; border-radius: 8px; padding: 8px 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .1s; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.93); }
  .btn-confirm     { background: #e8f5e9; color: #2e7d32; }
  .btn-delete      { background: #fce4ec; color: #c62828; }
  .btn-sm          { font-size: 12px; padding: 4px 10px; border-radius: 6px; }
  .btn-confirm-all { background: #e8f5e9; color: #2e7d32; }
  .btn-delete-all  { background: #fce4ec; color: #c62828; }
  .btn-icon        { background: rgba(255,255,255,.15); color: #fff; padding: 6px 10px; border-radius: 8px; font-size: 15px; }

  /* ── Toast ────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: #323232; color: #fff;
    padding: 10px 20px; border-radius: 24px;
    font-size: 14px; opacity: 0;
    transition: opacity .3s; pointer-events: none;
    z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 400px) {
    .time { font-size: 17px; }
    .btn  { padding: 7px 10px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ── Setup screen ──────────────────────────────────────── -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>⚙️ Konfigurera</h2>
    <p>Ange din Apps Script-URL och hemlig token. Dessa sparas lokalt på din enhet och skickas aldrig någon annanstans.</p>
    <div class="field">
      <label>Apps Script URL</label>
      <input type="url" id="input-url" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Token</label>
      <input type="password" id="input-token" placeholder="Din hemliga token" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="btn-save" onclick="saveConfig()">Spara och fortsätt</button>
  </div>
  <p class="setup-note">Du kan återställa dessa inställningar via ↻-knappen i appen.</p>
</div>

<!-- ── Main app ───────────────────────────────────────────── -->
<div id="app">
  <header>
    <h1>⏱ Worktime Review</h1>
    <div class="header-actions">
      <span class="badge-count" id="count-badge">…</span>
      <button class="btn btn-icon" onclick="load()" title="Uppdatera">↻</button>
      <button class="btn btn-icon" onclick="resetConfig()" title="Inställningar">⚙</button>
    </div>
  </header>
  <div class="container" id="root">
    <div class="state"><div class="spinner"></div><p>Hämtar poster…</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config (stored in localStorage, never in code) ────────
const STORAGE_URL   = "wt_api_url";
const STORAGE_TOKEN = "wt_token";

function getConfig() {
  return {
    url:   localStorage.getItem(STORAGE_URL)   || "",
    token: localStorage.getItem(STORAGE_TOKEN) || ""
  };
}

function saveConfig() {
  const url   = document.getElementById("input-url").value.trim();
  const token = document.getElementById("input-token").value.trim();
  if (!url || !token) { toast("Fyll i båda fälten"); return; }
  localStorage.setItem(STORAGE_URL,   url);
  localStorage.setItem(STORAGE_TOKEN, token);
  showApp();
  load();
}

function resetConfig() {
  if (!confirm("Återställ inställningar?")) return;
  localStorage.removeItem(STORAGE_URL);
  localStorage.removeItem(STORAGE_TOKEN);
  showSetup();
}

function showSetup() {
  document.getElementById("setup-screen").classList.add("visible");
  document.getElementById("app").classList.remove("visible");
}

function showApp() {
  document.getElementById("setup-screen").classList.remove("visible");
  document.getElementById("app").classList.add("visible");
}

// ── Boot: show setup or app depending on stored config ────
(function boot() {
  const { url, token } = getConfig();
  if (url && token) { showApp(); load(); }
  else { showSetup(); }
})();

// ── Toast ─────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── Badge ─────────────────────────────────────────────────
let pendingCount = 0;
function updateBadge(n) {
  const el = document.getElementById("count-badge");
  el.textContent = n > 0 ? `${n} pending` : "✓ klart";
  el.className = "badge-count" + (n === 0 ? " done" : "");
}

// ── Weekday names ─────────────────────────────────────────
const DAYS = ["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];
function dayName(dateStr) {
  return DAYS[new Date(dateStr + "T12:00:00").getDay()];
}

// ── Render ────────────────────────────────────────────────
function render(pending) {
  pendingCount = pending.length;
  updateBadge(pendingCount);
  const root = document.getElementById("root");

  if (pending.length === 0) {
    root.innerHTML = `
      <div class="state">
        <div class="icon">✅</div>
        <p>Alla poster granskade — inget att göra!</p>
      </div>`;
    return;
  }

  const byDate = {};
  pending.forEach(p => {
    if (!byDate[p.date]) byDate[p.date] = [];
    byDate[p.date].push(p);
  });

  root.innerHTML = Object.keys(byDate).sort().map(date => {
    const entries = byDate[date].map(p => `
      <div class="entry ${p.event === "check IN" ? "in" : "out"}" id="row-${p.rowIndex}">
        <div class="entry-info">
          <span class="badge ${p.event === "check IN" ? "badge-in" : "badge-out"}">
            ${p.event === "check IN" ? "▶ IN" : "◼ OUT"}
          </span>
          <span class="time">${p.timestamp.slice(11,16)}</span>
          <span class="source">${p.source}</span>
          ${p.note ? `<span class="note">${p.note}</span>` : ""}
        </div>
        <div class="entry-actions">
          <button class="btn btn-confirm" onclick="act(${p.rowIndex},'confirm')">✓</button>
          <button class="btn btn-delete"  onclick="act(${p.rowIndex},'delete')">✕</button>
        </div>
      </div>`).join("");

    return `
      <div class="day-group">
        <div class="day-header">
          <span class="day-name">${dayName(date)}</span>
          <span class="day-date">${date}</span>
          <button class="btn btn-sm btn-confirm-all" onclick="bulkAct('${date}','confirm')">✓ Alla</button>
          <button class="btn btn-sm btn-delete-all"  onclick="bulkAct('${date}','delete')">✕ Alla</button>
        </div>
        ${entries}
      </div>`;
  }).join("");
}

// ── Load ──────────────────────────────────────────────────
async function load() {
  const { url, token } = getConfig();
  document.getElementById("root").innerHTML =
    `<div class="state"><div class="spinner"></div><p>Hämtar poster…</p></div>`;
  updateBadge(0);

  try {
    const res  = await fetch(`${url}?token=${encodeURIComponent(token)}&action=pending`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "okänt fel");
    render(data.pending);
  } catch (err) {
    document.getElementById("root").innerHTML = `
      <div class="state">
        <div class="icon">⚠️</div>
        <p>Kunde inte hämta data:<br><small>${err.message}</small></p>
        <br>
        <button class="btn btn-confirm" onclick="load()" style="margin:auto;display:block">Försök igen</button>
      </div>`;
    updateBadge(0);
  }
}

// ── Act on single entry ───────────────────────────────────
async function act(rowIndex, action) {
  const { url, token } = getConfig();
  const el = document.getElementById(`row-${rowIndex}`);
  if (!el || el.classList.contains("confirmed") || el.classList.contains("deleted")) return;

  el.style.opacity = "0.4";
  el.style.pointerEvents = "none";

  try {
    const res  = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, action, rowIndex })
    });
    const data = await res.json();
    if (data.ok) {
      el.classList.add(action === "confirm" ? "confirmed" : "deleted");
      pendingCount--;
      updateBadge(pendingCount);
      toast(action === "confirm" ? "✓ Bekräftad" : "✕ Borttagen");
    } else {
      throw new Error(data.error || "okänt");
    }
  } catch (err) {
    el.style.opacity = "1";
    el.style.pointerEvents = "auto";
    toast("Fel: " + err.message);
  }
}

// ── Bulk act ──────────────────────────────────────────────
async function bulkAct(date, action) {
  const groups = document.querySelectorAll(".day-group");
  for (const group of groups) {
    const dateEl = group.querySelector(".day-date");
    if (!dateEl || dateEl.textContent !== date) continue;
    const entries = group.querySelectorAll(".entry:not(.confirmed):not(.deleted)");
    for (const el of entries) {
      await act(parseInt(el.id.replace("row-", "")), action);
    }
  }
}
</script>
</body>
</html>
